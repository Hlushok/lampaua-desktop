name: Build and Release Linux, macOS, Windows builds

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      changelog_body: ${{ steps.changelog.outputs.body }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Build linux packages
        run: yarn run build-linux

      - name: Extract version
        id: get_version
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            version=$(node -p "require('./package.json').version")
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          sed -n "/^## \\[${VERSION}\\]/,/^## /p" CHANGELOG.md | sed '$d' > changelog.txt
          if [ ! -s changelog.txt ]; then
            echo "No changelog entries found for version $VERSION"
            echo "body=No changelog entries found for version $VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            cat changelog.txt >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v6
        with:
          name: lampa-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/latest-linux.yml

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build for macOS
        run: yarn run build-mac

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v6
        with:
          name: lampa-macos
          path: |
            dist/*.dmg
            dist/latest-mac.yml

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build for Windows
        run: yarn run build-win

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v6
        with:
          name: lampa-windows
          path: |
            dist/*.exe
            dist/latest.yml

  generate-downloads-table:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    outputs:
      downloads_section: ${{ steps.generate.outputs.downloads_section }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Generate downloads table
        id: generate
        run: |
          VERSION="${{ needs.build-linux.outputs.version }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION"

          file_size() {
            du -h "$1" | cut -f1
          }

          asset_url() {
            echo "$RELEASE_URL/$(basename "$1")"
          }

          badge_button() {
            local file="$1"
            local label="$2"
            local color="$3"
            local logo="$4"

            if [ -f "$file" ]; then
              local filename
              local size
              local url

              filename=$(basename "$file")
              size=$(file_size "$file")
              url=$(asset_url "$file")

              echo "<a href=\"$url\"><img alt=\"$label\" src=\"https://img.shields.io/badge/$label-Download-$color?style=for-the-badge&logo=$logo\"></a><br><sub><code>$filename</code> - $size</sub>"
            else
              echo "Not available"
            fi
          }

          cat > downloads.md << 'EOF'
          ## Download

          | Recommended | Other Windows |
          |-------------|---------------|
          EOF

          windows_x64=$(find lampa-windows -maxdepth 1 -type f -name '*-x64-*.exe' | sort | head -n 1)
          windows_arm64=$(find lampa-windows -maxdepth 1 -type f -name '*-arm64-*.exe' | sort | head -n 1)
          windows_ia32=$(find lampa-windows -maxdepth 1 -type f -name '*-ia32-*.exe' | sort | head -n 1)

          win_recommended=$(badge_button "$windows_x64" "Windows_x64" "238636" "windows")
          win_arm=$(badge_button "$windows_arm64" "Windows_ARM64" "0969da" "windows")
          win_32=$(badge_button "$windows_ia32" "Windows_32--bit" "6e7781" "windows")

          echo "| $win_recommended | $win_arm<br><br>$win_32 |" >> downloads.md

          cat >> downloads.md << 'EOF'

          | macOS | Linux |
          |-------|-------|
          EOF

          mac_arm64=$(find lampa-macos -maxdepth 1 -type f -name '*-arm64-*.dmg' | sort | head -n 1)
          mac_x64=$(find lampa-macos -maxdepth 1 -type f -name '*-x64-*.dmg' | sort | head -n 1)
          linux_deb_x64=$(find lampa-linux -maxdepth 1 -type f \( -name '*-amd64-*.deb' -o -name '*-x64-*.deb' \) | sort | head -n 1)
          linux_rpm_x64=$(find lampa-linux -maxdepth 1 -type f \( -name '*-x86_64-*.rpm' -o -name '*-amd64-*.rpm' -o -name '*-x64-*.rpm' \) | sort | head -n 1)
          linux_appimage=$(find lampa-linux -maxdepth 1 -type f -name '*.AppImage' | sort | head -n 1)

          mac_buttons="$(badge_button "$mac_arm64" "macOS_Apple_Silicon" "0969da" "apple")<br><br>$(badge_button "$mac_x64" "macOS_Intel" "6e7781" "apple")"
          linux_buttons="$(badge_button "$linux_deb_x64" "Ubuntu_DEB" "e95420" "ubuntu")<br><br>$(badge_button "$linux_rpm_x64" "Fedora_RPM" "51a2da" "fedora")<br><br>$(badge_button "$linux_appimage" "Linux_AppImage" "238636" "linux")"

          echo "| $mac_buttons | $linux_buttons |" >> downloads.md

          linux_arm_assets=""
          for file in lampa-linux/*arm64* lampa-linux/*aarch64*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              size=$(file_size "$file")
              url=$(asset_url "$file")
              linux_arm_assets="$linux_arm_assets- [$filename]($url) - $size"$'\n'
            fi
          done

          cat >> downloads.md << 'EOF'

          <details>
          <summary>Linux ARM packages</summary>

          EOF

          if [ -n "$linux_arm_assets" ]; then
            printf "%s" "$linux_arm_assets" >> downloads.md
          else
            echo "No Linux ARM packages in this release." >> downloads.md
          fi

          cat >> downloads.md << 'EOF'
          </details>
          EOF

          downloads_section=$(cat downloads.md)
          echo "downloads_section<<EOF" >> "$GITHUB_OUTPUT"
          echo "$downloads_section" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, generate-downloads-table]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Combine release body
        run: |
          cat > release_body.md << 'EOF'
          ${{ needs.generate-downloads-table.outputs.downloads_section }}
          EOF

          cat >> release_body.md << 'EOF'

          ## About this fork

          LampaUa Desktop is an unofficial fork of `Kolovatoff/lampa-desktop`, adapted for LampaUa. We changed the app name, default start URL, settings, releases and auto-updates. This project is not an official release of the original Lampa project.

          Original project: https://github.com/Kolovatoff/lampa-desktop
          EOF

          echo "" >> release_body.md

          cat >> release_body.md << 'EOF'
          ${{ needs.build-linux.outputs.changelog_body }}
          EOF

          cat release_body.md

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release_body.md
          files: |
            lampa-linux/*.AppImage
            lampa-linux/*.deb
            lampa-linux/*.rpm
            lampa-linux/latest-linux.yml
            lampa-macos/*.dmg
            lampa-macos/latest-mac.yml
            lampa-windows/*.exe
            lampa-windows/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
